        window.addEventListener('offline', updateOfflineStatus);

        function generate96BitKey() {
            let key = '';
            const arr = crypto.getRandomValues(new Uint8Array(96));
            for (let i = 0; i < 96; i++) key += KEY_CHARSET[arr[i] % KEY_CHARSET.length];
            return key;
        }
        
        function parse96KeyToRoomParams(key96) {
            if (key96.length !== 96) throw new Error('密钥必须为96位');
            const part1 = key96.slice(0,48).replace(/[^A-Za-z0-9]/g, 'A');
            const part2 = key96.slice(48,96).replace(/[^A-Za-z0-9]/g, 'B');
            const appName = "ip2pchat";
            const channelName = "Room_" + part2.slice(0,16);
            const password = key96.slice(24,56).replace(/[^A-Za-z0-9]/g, 'C') + "p2p";
            return { appName, channelName, password };
        }
        
        async function deriveKeyFromPassword(password, salt, iterations) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
            return await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: enc.encode(salt), iterations, hash: 'SHA-256' },
                baseKey,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }
        
        async function deriveAesKeyFrom96(key96) {
            return await deriveKeyFromPassword(key96, 'P2P-Chat-Salt-V5-96', ROOM_KEY_ITERATIONS);
        }
        
        // ==================== 用户级非对称加密 ====================
        async function generateUserKeyPair() {
            return await crypto.subtle.generateKey(
                { name: 'ECDH', namedCurve: 'P-256' },
                true,
                ['deriveKey', 'deriveBits']
            );
        }
        
        async function exportPublicKeyJwk(publicKey) {
            return await crypto.subtle.exportKey('jwk', publicKey);
        }
        
        async function importPublicKeyJwk(jwk) {
            return await crypto.subtle.importKey('jwk', jwk, { name: 'ECDH', namedCurve: 'P-256' }, true, []);
        }
        
        async function deriveSharedSecret(myPrivateKey, peerPublicKey) {
            const sharedSecret = await crypto.subtle.deriveBits(
                { name: 'ECDH', public: peerPublicKey },
                myPrivateKey,
                256
            );
            const sharedKey = await crypto.subtle.importKey(
                'raw',
                sharedSecret,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
            return sharedKey;
        }

        async function generateIdentity(nickname, importSeed = null) {
            const seed = importSeed || (crypto.randomUUID() + Date.now() + crypto.getRandomValues(new Uint8Array(8)));
            const enc = new TextEncoder();
            const seedHash = await crypto.subtle.digest('SHA-256', enc.encode(seed));
            const fullHash = Array.from(new Uint8Array(seedHash)).map(b => b.toString(16).padStart(2,'0')).join('');
            const shortHash = fullHash.slice(0,5).toUpperCase();
            const keyPair = await crypto.subtle.generateKey({ name: 'ECDSA', namedCurve: 'P-256' }, true, ['sign', 'verify']);
            return { seed, privateKey: keyPair.privateKey, publicKey: keyPair.publicKey, fingerprintShort: shortHash, fingerprintFull: fullHash, nickname };
        }
        
        async function signMessage(privateKey, content) {
            const sig = await crypto.subtle.sign({ name: 'ECDSA', hash: 'SHA-256' }, privateKey, new TextEncoder().encode(content));
            return Array.from(new Uint8Array(sig));
        }
        async function verifySignature(publicKey, content, sig) {
            try { return await crypto.subtle.verify({ name: 'ECDSA', hash: 'SHA-256' }, publicKey, new Uint8Array(sig), new TextEncoder().encode(content)); }
            catch(e) { return false; }
        }
        
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > 1200) { height = (height * 1200 / width); width = 1200; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => {
                            const r = new FileReader();
                            r.onload = () => resolve(r.result);
                            r.readAsDataURL(blob);
                        }, 'image/jpeg', 0.7);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function encryptForPeer(peerId, plaintext) {
            const peerKey = peerUserKeys.get(peerId);
            if (!peerKey) return null;
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, peerKey, encoder.encode(plaintext));
            return { iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) };
        }
        
        async function decryptFromPeer(peerId, encryptedData) {
            const peerKey = peerUserKeys.get(peerId);
            if (!peerKey) return null;
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(encryptedData.iv) }, peerKey, new Uint8Array(encryptedData.data));
            return decoder.decode(decrypted);
        }
        
        async function sendEncrypted(targetId, type, payload, useUserEncryption = true) {
            if (!currentP2P || !aesKey) return;
            let finalPayload = { type, ...payload };
            let encryptedData;
            if (useUserEncryption && targetId && targetId !== myRawId) {
                const plaintext = JSON.stringify(finalPayload);
                const encrypted = await encryptForPeer(targetId, plaintext);
                if (!encrypted) return;
                finalPayload = { encrypted: true, data: encrypted };
            }
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, encoder.encode(JSON.stringify(finalPayload)));
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv); combined.set(new Uint8Array(encrypted), iv.length);
            if (targetId) {
                currentP2P.Send({ ciphertext: Array.from(combined) }, { connectId: targetId });
            } else {
                for (let pid of onlinePeers.keys()) {
                    if (pid !== myRawId && onlinePeers.get(pid)?.nickname !== "加载中...") {
                        currentP2P.Send({ ciphertext: Array.from(combined) }, { connectId: pid });
                    }
                }
            }
        }
        
        async function rotateUserKey() {
            if (!myUserKeyPair || !currentP2P || !isInRoom) return;
            const newKeyPair = await generateUserKeyPair();
            const oldPublicJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
            myUserKeyPair = newKeyPair;
            const newPublicJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
            await sendEncrypted(null, 'key_rotate', { oldPublicKey: oldPublicJwk, newPublicKey: newPublicJwk });
            appendSystemMessage(t('keyRotated'));
        }
        
        async function handleUserKeyExchange(senderId, publicKeyJwk) {
            const peerPublicKey = await importPublicKeyJwk(publicKeyJwk);
            const sharedKey = await deriveSharedSecret(myUserKeyPair.privateKey, peerPublicKey);
            peerUserKeys.set(senderId, sharedKey);
        }
        
        async function sendChatMessage(text, isImage = false, imgData = null) {

            const { seq, win } = getNextSeq(myRawId);
            const content = { text: isImage ? null : text, image: imgData, seq, win, fromNick: myIdentity.nickname, fromFp: myIdentity.fingerprintShort };
            const signature = await signMessage(myIdentity.privateKey, JSON.stringify(content));
            for (let [pid, info] of onlinePeers) {
                if (pid !== myRawId && info.nickname !== "加载中...") {
                    await sendEncrypted(pid, 'chat', { signature, ...content }, true);
                }
            }
            const displayMsg = isImage ? `<img src="${imgData}">` : escapeHtml(text);
            appendChatMessage(myIdentity.nickname, myIdentity.fingerprintShort, displayMsg, true);
        }
        
        async function handleReceivedMessage(senderId, data) {
            if (data.encrypted && data.data) {
                const decrypted = await decryptFromPeer(senderId, data.data);
                if (decrypted) {
                    data = JSON.parse(decrypted);
                }
            }
            
            if (data.type === 'identity') {
                const pub = await crypto.subtle.importKey('jwk', data.publicKey, { name: 'ECDSA', namedCurve: 'P-256' }, true, ['verify']);
                peerIdentities.set(senderId, { nickname: data.nickname, fingerprintShort: data.fingerprintShort, fingerprintFull: data.fingerprintFull, publicKey: pub });
                const existing = onlinePeers.get(senderId);
                if (!existing || existing.nickname === "加载中...") {
                    onlinePeers.set(senderId, { nickname: data.nickname, fingerprintShort: data.fingerprintShort, fingerprintFull: data.fingerprintFull });
                    updateOnlineUI();
                    if (Date.now() >= silentUntil) appendSystemMessage(`${data.nickname} ${t('joined')}`);
                    await processPendingMessages(senderId);
                }
                if (data.userPublicKey) {
                    await handleUserKeyExchange(senderId, data.userPublicKey);
                }
                const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
                const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                await sendEncrypted(senderId, 'identity', { nickname: myIdentity.nickname, fingerprintShort: myIdentity.fingerprintShort, fingerprintFull: myIdentity.fingerprintFull, publicKey: myPubJwk, userPublicKey: myUserPubJwk }, true);
            }
            else if (data.type === 'key_rotate') {
                const newPublicKey = await importPublicKeyJwk(data.newPublicKey);
                const sharedKey = await deriveSharedSecret(myUserKeyPair.privateKey, newPublicKey);
                peerUserKeys.set(senderId, sharedKey);
            }
            else if (data.type === 'chat') {
                if (!checkAndUpdateSeq(senderId, data.seq, data.win)) { appendSystemMessage(t('replyAttack')); return; }
                const peerInfo = peerIdentities.get(senderId);
                if (!peerInfo || !peerInfo.publicKey) {
                    if (!pendingMessages.has(senderId)) pendingMessages.set(senderId, []);
                    pendingMessages.get(senderId).push(data);
                    const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                    await sendEncrypted(senderId, 'identity_req', { userPublicKey: myUserPubJwk }, true);
                    return;
                }
                const contentForVerify = { text: data.text, image: data.image, seq: data.seq, win: data.win, fromNick: data.fromNick, fromFp: data.fromFp };
                if (!await verifySignature(peerInfo.publicKey, JSON.stringify(contentForVerify), data.signature)) {
                    appendSystemMessage(t('sigInvalid'));
                    return;
                }
                const displayMsg = data.image ? `<img src="${data.image}">` : escapeHtml(data.text);
                appendChatMessage(data.fromNick, data.fromFp, displayMsg, false);
            }
            else if (data.type === 'identity_req') {
                const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
                const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                await sendEncrypted(senderId, 'identity', { nickname: myIdentity.nickname, fingerprintShort: myIdentity.fingerprintShort, fingerprintFull: myIdentity.fingerprintFull, publicKey: myPubJwk, userPublicKey: myUserPubJwk }, true);
            }
            else if (data.type === 'leave') {
                if (onlinePeers.has(senderId)) {
                    const name = onlinePeers.get(senderId).nickname;
                    onlinePeers.delete(senderId);
                    peerIdentities.delete(senderId);
                    peerSeqState.delete(senderId);
                    peerUserKeys.delete(senderId);
                    pendingMessages.delete(senderId);
                    updateOnlineUI();
                    if (name !== "加载中..." && Date.now() >= silentUntil) appendSystemMessage(`${name} ${t('left')}`);
                }
            }
        }
        
        async function processPendingMessages(peerId) {
            const pendings = pendingMessages.get(peerId);
            if (pendings && pendings.length > 0) {
                for (const pending of pendings) {
                    await handleReceivedMessage(peerId, pending);
                }
                pendingMessages.delete(peerId);
            }
        }

        async function enterRoom(appName, channelName, password, rawKey96) {
            showLoading(t('derivingKey'));
            try {
                aesKey = await deriveAesKeyFrom96(rawKey96);
                myUserKeyPair = await generateUserKeyPair();
                const p2p = webconnect({ appName, channelName, connectPassword: password, iceConfiguration: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
                currentP2P = p2p;
                p2p.getMyId((res) => { myRawId = res.connectId; updateOnlineUI(); setTimeout(() => broadcastMyIdentity(), 500); });
                onlinePeers.clear(); peerIdentities.clear(); peerSeqState.clear(); peerUserKeys.clear(); pendingMessages.clear();
                silentUntil = Date.now() + 2000;
                
                p2p.onConnect(async (ci) => {
                    if (ci.connectId === myRawId) return;
                    if (!onlinePeers.has(ci.connectId)) {
                        onlinePeers.set(ci.connectId, { nickname: "加载中...", fingerprintShort: '??', fingerprintFull: '' });
                        updateOnlineUI();
                        const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
                        const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                        await sendEncrypted(ci.connectId, 'identity', { nickname: myIdentity.nickname, fingerprintShort: myIdentity.fingerprintShort, fingerprintFull: myIdentity.fingerprintFull, publicKey: myPubJwk, userPublicKey: myUserPubJwk }, true);
                    }
                });
                
                p2p.onDisconnect(async (ci) => {
                    if (onlinePeers.has(ci.connectId)) {
                        const name = onlinePeers.get(ci.connectId).nickname;
                        onlinePeers.delete(ci.connectId);
                        peerIdentities.delete(ci.connectId);
                        peerSeqState.delete(ci.connectId);
                        peerUserKeys.delete(ci.connectId);
                        pendingMessages.delete(ci.connectId);
                        updateOnlineUI();
                        if (name !== "加载中..." && Date.now() >= silentUntil) appendSystemMessage(`${name} ${t('left')}`);
                    }
                });
                
                p2p.onReceive(async (data, ci) => {
                    if (data?.ciphertext) {
                        try {
                            const combined = new Uint8Array(data.ciphertext);
                            const iv = combined.slice(0, 12);
                            const encrypted = combined.slice(12);
                            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, encrypted);
                            const msgData = JSON.parse(decoder.decode(decrypted));
                            await handleReceivedMessage(ci.connectId, msgData);
                        } catch(e) { console.warn("Decrypt error:", e); }
                    }
                });
                
                if (keyRotationInterval) clearInterval(keyRotationInterval);
                keyRotationInterval = setInterval(() => rotateUserKey(), 180000); // 3分钟
                
                document.getElementById('homeScreen').style.display = 'none';
                document.getElementById('joinRoomPanel').style.display = 'none';
                document.getElementById('chatRoomUI').style.display = 'flex';
                appendSystemMessage(t('channelReady'));
                document.getElementById('inviteKeyDisplay').innerHTML = '•'.repeat(96);
                document.getElementById('inviteKeyContainer').style.display = 'flex';
                const warn = document.getElementById('historyWarning');
                if(warn) { warn.style.display = 'block'; setTimeout(() => { if(warn) warn.style.display = 'none'; }, 8000); }
                isInRoom = true;
                currentRoomKey96 = rawKey96;
                onlinePeers.set(myRawId, { nickname: myIdentity.nickname, fingerprintShort: myIdentity.fingerprintShort, fingerprintFull: myIdentity.fingerprintFull });
                peerIdentities.set(myRawId, myIdentity);
                updateOnlineUI();
                hideLoading();
            } catch(e) { hideLoading(); showAlert("进入房间失败: "+e.message); throw e; }
        }

        document.getElementById('myNicknameLabel').onclick = () => {
            const newNick = prompt(t('changeNickname') + '\n' + t('newNickname'), myIdentity?.nickname || '');
            if (newNick && newNick.trim() && myIdentity && newNick.trim() !== myIdentity.nickname) {
                const oldNick = myIdentity.nickname;
                myIdentity.nickname = newNick.trim();
                updateOnlineUI();
                broadcastMyIdentity();
                appendSystemMessage(`${oldNick} → ${myIdentity.nickname}`);
            }
        };
        document.getElementById('myFingerprintLabel').onclick = () => {
            if(!myIdentity) return;
            showFingerprintDialog(t('myFingerprint'), myIdentity.fingerprintFull, true, () => exportCurrentFingerprint());
        };
        document.getElementById('imageInput').addEventListener('change', sendMessage);
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                updateAllTexts();
                if (isInRoom) updateOnlineUI();
                if(document.getElementById('messageInput')) document.getElementById('messageInput').placeholder = t('inputPlaceholder');
                const warn = document.getElementById('historyWarning');
                if(warn && isInRoom) warn.innerHTML = t('historyWarning');
                const loadMoreDiv = document.querySelector('.load-more-trigger');
                if(loadMoreDiv) loadMoreDiv.innerText = t('loadMore');
            };
        });
        updateAllTexts();
    });
</script>
</body>
</html>
