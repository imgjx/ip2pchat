    window.addEventListener('load', function() {
        if (typeof webconnect === 'undefined') {
            console.error('webconnect not loaded');
            return;

        if (!window.isSecureContext) {
            showAlert("⚠️ Security Error: This application requires HTTPS or localhost.");
            throw new Error("Insecure context");
        }
        
        // ==================== 加密参数 ====================
        const ROOM_ID_PBKDF2_ITERATIONS = 5000;
        const FINGERPRINT_ITERATIONS = 3000000;
        const MASTER_KEY_ITERATIONS = 200000;
        const KEY_CHARSET = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*:;?=";
        const MAX_MESSAGES = 500;
        const UNLOAD_THRESHOLD = 300;
        const IMGJX_SALT = "imgjx_ip2pchat_salt_v3";
        
        // 生成128位房间密钥
        function generate128BitRoomKey() {
            let key = '';
            const arr = crypto.getRandomValues(new Uint8Array(128));
            for (let i = 0; i < 128; i++) key += KEY_CHARSET[arr[i] % KEY_CHARSET.length];
            return key;
        }
        
        // PBKDF2 派生函数
        async function pbkdf2Derive(input, salt, iterations, outputLength = 32) {
            const enc = new TextEncoder();
            const baseKey = await crypto.subtle.importKey('raw', enc.encode(input), { name: 'PBKDF2' }, false, ['deriveBits']);
            const derivedBits = await crypto.subtle.deriveBits(
                { name: 'PBKDF2', salt: enc.encode(salt), iterations: iterations, hash: 'SHA-256' },
                baseKey,
                outputLength * 8
            );
            return Array.from(new Uint8Array(derivedBits)).map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // 根据房间密钥派生房间ID和连接参数
        async function deriveRoomParamsFromKey(roomKey) {
            if (roomKey.length !== 128) throw new Error('房间密钥必须为128位');
            
            // 提取指定位置字符: 第2~6位(索引1-5)，9,10,12,22,33,44,55,66,77,88,95
            const positions = [1,2,3,4,5, 8,9, 11, 21, 32, 43, 54, 65, 76, 87, 94];
            let roomSeed = '';
            for (let pos of positions) {
                if (pos < roomKey.length) roomSeed += roomKey[pos];
            }
            // 使用 PBKDF2 派生5000次，取前48字符
            const roomIdFull = await pbkdf2Derive(roomSeed, IMGJX_SALT + '_roomid', ROOM_ID_PBKDF2_ITERATIONS, 48);
            const roomIdPart = roomIdFull.slice(0, 48);
            
            // 提取房间密钥第24~32字符（索引23-31）
            const aesSeedPart = roomKey.slice(23, 32);
            // 对aesSeedPart进行SHA-256，取32~60位
            const enc = new TextEncoder();
            const aesSeedHashBuf = await crypto.subtle.digest('SHA-256', enc.encode(aesSeedPart + IMGJX_SALT));
            const aesSeedHashArray = Array.from(new Uint8Array(aesSeedHashBuf));
            const aesSeedHashStr = aesSeedHashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            const aesPart = aesSeedHashStr.slice(32, 60);
            
            // 从房间密钥派生临时AES密钥取最后4字符（可提取用于导出）
            const tempAesKey = await deriveKeyFromPassword(roomKey, 'RoomKeyTemp', 1000, true);
            const tempAesKeyBuf = await crypto.subtle.exportKey('raw', tempAesKey);
            const tempAesKeyArray = Array.from(new Uint8Array(tempAesKeyBuf));
            const last4Chars = tempAesKeyArray.slice(-4).map(b => KEY_CHARSET[b % KEY_CHARSET.length]).join('');
            
            const finalRoomId = roomIdPart;
            const channelName = "Room_" + finalRoomId.slice(0, 12);
            const connectPassword = aesPart + last4Chars;
            const appName = "ip2pchat_imgjx";
            
            return { appName, channelName, password: connectPassword, roomId: finalRoomId };
        }
        
        async function deriveKeyFromPassword(password, salt, iterations, extractable = false) {
            const enc = new TextEncoder();
            const fullSalt = IMGJX_SALT + salt;
            const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']);
            return await crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt: enc.encode(fullSalt), iterations: iterations, hash: 'SHA-256' },
                baseKey,
                { name: 'AES-GCM', length: 256 },
                extractable,
                ['encrypt', 'decrypt']
            );
        }
        
        async function deriveAesKeyFromRoomKey(roomKey) {
            return await deriveKeyFromPassword(roomKey, 'P2P-Chat-Master-V2', MASTER_KEY_ITERATIONS, false);
        }
        
        // ==================== 用户级非对称加密 (ECDH) ====================
        async function generateUserKeyPair() {
            return await crypto.subtle.generateKey(
                { name: 'ECDH', namedCurve: 'P-256' },
                true,
                ['deriveKey', 'deriveBits']
            );
        }
        
        async function exportPublicKeyJwk(publicKey) {
            return await crypto.subtle.exportKey('jwk', publicKey);
        }
        
        async function importPublicKeyJwk(jwk) {
            return await crypto.subtle.importKey('jwk', jwk, { name: 'ECDH', namedCurve: 'P-256' }, true, []);
        }
        
        async function deriveSharedSecret(myPrivateKey, peerPublicKey) {
            const sharedSecret = await crypto.subtle.deriveBits(
                { name: 'ECDH', public: peerPublicKey },
                myPrivateKey,
                256
            );
            return await crypto.subtle.importKey(
                'raw',
                sharedSecret,
                { name: 'AES-GCM', length: 256 },
                false,
                ['encrypt', 'decrypt']
            );
        }

        // 全局弹框管理：关闭当前弹框再开新弹框
        let currentOverlay = null;
        let currentDialog = null;
        
        function closeCurrentModal() {
            if (currentOverlay) currentOverlay.remove();
            if (currentDialog) currentDialog.remove();
            currentOverlay = null;
            currentDialog = null;
        }
        
        function showModal(contentHtml, onConfirm, onCancel, confirmText = null, cancelText = null) {
            closeCurrentModal(); // 先关闭已存在的弹框
            const overlay = document.createElement('div'); overlay.className = 'overlay';
            const dialog = document.createElement('div'); dialog.className = 'modal-dialog';
            const confirmBtnText = confirmText || (t('confirmExit') || '确认');
            const cancelBtnText = cancelText || (t('close') || '取消');
            dialog.innerHTML = contentHtml + `<div class="modal-buttons"><button class="btn modal-confirm" style="flex:1">${confirmBtnText}</button><button class="btn modal-cancel" style="flex:1">${cancelBtnText}</button></div>`;
            document.body.appendChild(overlay); document.body.appendChild(dialog);
            currentOverlay = overlay;
            currentDialog = dialog;
            const close = () => { closeCurrentModal(); };
            dialog.querySelector('.modal-confirm')?.addEventListener('click', () => { if(onConfirm) onConfirm(dialog); close(); });
            dialog.querySelector('.modal-cancel')?.addEventListener('click', () => { if(onCancel) onCancel(); close(); });
            return dialog;
        }
        
        function showAlert(msg, onClose = null) {
            const overlay = document.createElement('div'); overlay.className = 'overlay';
            const dialog = document.createElement('div'); dialog.className = 'modal-dialog';
            dialog.innerHTML = `<p style="margin-bottom:16px; word-break:break-word;">${escapeHtml(msg)}</p><div class="modal-buttons"><button class="btn modal-confirm" style="width:100%">${t('close')}</button></div>`;
            document.body.appendChild(overlay); document.body.appendChild(dialog);
            currentOverlay = overlay;
            currentDialog = dialog;
            dialog.querySelector('.modal-confirm').onclick = () => { 
                closeCurrentModal(); 
                if(onClose) onClose(); 
            };
        }
        
        function showConfirm(msg, onConfirm, onCancel = null) {
            const overlay = document.createElement('div'); overlay.className = 'overlay';
            const dialog = document.createElement('div'); dialog.className = 'modal-dialog';
            dialog.innerHTML = `<p style="margin-bottom:16px; word-break:break-word;">${escapeHtml(msg)}</p><div class="modal-buttons"><button class="btn modal-confirm" style="flex:1">${t('confirmExit')}</button><button class="btn modal-cancel" style="flex:1">${t('close')}</button></div>`;

        }

        // 防重放
        let peerSeqState = new Map();
        function getCurrentWindow() { return Math.floor(Date.now() / 10000); }
        function checkAndUpdateSeq(peerId, seq, win) {
            let state = peerSeqState.get(peerId);
            if (!state || state.window !== win) { peerSeqState.set(peerId, { window: win, lastSeq: seq }); return true; }
            if (seq > state.lastSeq) { state.lastSeq = seq; return true; }
            return false;
        }
        function getNextSeq(peerId) {
            const win = getCurrentWindow();
            let state = peerSeqState.get(peerId);
            if (!state || state.window !== win) { peerSeqState.set(peerId, { window: win, lastSeq: 0 }); return { seq: 0, win }; }
            const next = state.lastSeq + 1; state.lastSeq = next;
            return { seq: next, win };
        }

        // 指纹生成：完整SHA-256哈希（64位十六进制），短指纹取前5位
        async function generateFingerprint(seed) {
            const enc = new TextEncoder();
            const fullSeed = IMGJX_SALT + seed;
            const hashBuffer = await crypto.subtle.digest('SHA-256', enc.encode(fullSeed));
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const fullHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
            const shortHash = fullHash.slice(0, 5);
            return { fullHash, shortHash };
        }
        
        async function generateIdentity(nickname, importSeed = null) {
            const seed = importSeed || (crypto.randomUUID() + Date.now() + crypto.getRandomValues(new Uint8Array(8)));
            const { fullHash, shortHash } = await generateFingerprint(seed);
            const keyPair = await crypto.subtle.generateKey({ name: 'ECDSA', namedCurve: 'P-256' }, true, ['sign', 'verify']);
            return { seed, privateKey: keyPair.privateKey, publicKey: keyPair.publicKey, fingerprintShort: shortHash, fingerprintFull: fullHash, nickname };
        }
        
        async function signMessage(privateKey, content) {
            const sig = await crypto.subtle.sign({ name: 'ECDSA', hash: 'SHA-256' }, privateKey, new TextEncoder().encode(content));
            return Array.from(new Uint8Array(sig));
        }
        async function verifySignature(publicKey, content, sig) {
            try { return await crypto.subtle.verify({ name: 'ECDSA', hash: 'SHA-256' }, publicKey, new Uint8Array(sig), new TextEncoder().encode(content)); }
            catch(e) { return false; }
        }
        
        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > 1200) { height = (height * 1200 / width); width = 1200; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => {
                            const r = new FileReader();
                            r.onload = () => resolve(r.result);
                            r.readAsDataURL(blob);
                        }, 'image/jpeg', 0.7);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // 使用用户级非对称加密
        async function sendUserEncrypted(targetId, plaintext) {
            const peerKey = peerUserKeys.get(targetId);
            if (!peerKey) return null;
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, peerKey, encoder.encode(plaintext));
            return { iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) };
        }
        
        async function decryptUserEncrypted(peerId, encryptedData) {
            const peerKey = peerUserKeys.get(peerId);
            if (!peerKey) return null;
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(encryptedData.iv) }, peerKey, new Uint8Array(encryptedData.data));
            return decoder.decode(decrypted);
        }
        
        async function sendEncrypted(targetId, type, payload, useUserEncryption = false) {
            if (!currentP2P || !aesKey) return;
            let finalPayload = { type, ...payload };
            let transportPayload = finalPayload;
            
            if (useUserEncryption && targetId && targetId !== myRawId && peerUserKeys.has(targetId)) {
                const plaintext = JSON.stringify(finalPayload);
                const encrypted = await sendUserEncrypted(targetId, plaintext);
                if (encrypted) {
                    transportPayload = { encrypted: true, data: encrypted };
                }
            }
            
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aesKey, encoder.encode(JSON.stringify(transportPayload)));
            const combined = new Uint8Array(iv.length + encrypted.byteLength);
            combined.set(iv); combined.set(new Uint8Array(encrypted), iv.length);
            if (targetId) {
                currentP2P.Send({ ciphertext: Array.from(combined) }, { connectId: targetId });
            } else {
                for (let pid of onlinePeers.keys()) {
                    if (pid !== myRawId && onlinePeers.get(pid)?.nickname !== "加载中...") {
                        currentP2P.Send({ ciphertext: Array.from(combined) }, { connectId: pid });
                    }
                }
            }
        }
        
        async function rotateUserKey() {
            if (!myUserKeyPair || !currentP2P || !isInRoom) return;
            const newKeyPair = await generateUserKeyPair();
            myUserKeyPair = newKeyPair;
            const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
            for (let [pid, info] of onlinePeers) {
                if (pid !== myRawId && info.nickname !== "加载中...") {
                    await sendEncrypted(pid, 'key_rotate', { newPublicKey: myUserPubJwk }, true);
                }
            }
        }
        
        async function handleUserKeyExchange(senderId, publicKeyJwk) {
            try {
                const peerPublicKey = await importPublicKeyJwk(publicKeyJwk);
                const sharedKey = await deriveSharedSecret(myUserKeyPair.privateKey, peerPublicKey);
                peerUserKeys.set(senderId, sharedKey);
                console.log(`imgjx: User key exchanged with ${senderId.slice(0,8)}`);
            } catch(e) { console.warn("imgjx: Key exchange failed:", e); }
        }
        
        async function sendChatMessage(text, isImage = false, imgData = null, targetFingerprint = null) {
            if (!currentP2P || !aesKey || !myIdentity) return;
            const { seq, win } = getNextSeq(myRawId);
            const content = { text: isImage ? null : text, image: imgData, seq, win, fromNick: myIdentity.nickname, fromFp: myIdentity.fingerprintFull };
            const signature = await signMessage(myIdentity.privateKey, JSON.stringify(content));
            
            if (targetFingerprint) {
                let targetId = null;
                for (let [pid, info] of onlinePeers) {
                    if (info.fingerprintFull === targetFingerprint) {
                        targetId = pid;
                        break;
                    }
                }
                if (targetId && targetId !== myRawId) {
                    await sendEncrypted(targetId, 'chat', { signature, ...content }, true);
                    appendSystemMessage(`${t('privateSent')} ${targetFingerprint.slice(0,8)}...`);
                } else {
                    showAlert(t('privateNotFound'));
                }
            } else {
                for (let [pid, info] of onlinePeers) {
                    if (pid !== myRawId && info.nickname !== "加载中...") {
                        await sendEncrypted(pid, 'chat', { signature, ...content }, true);
                    }
                }
                const displayMsg = isImage ? `<img src="${imgData}">` : escapeHtml(text);
                appendChatMessage(myIdentity.nickname, myIdentity.fingerprintFull, displayMsg, true);
            }
        }
        
        async function handleReceivedMessage(senderId, data) {
            if (data.encrypted && data.data) {
                const decrypted = await decryptUserEncrypted(senderId, data.data);
                if (decrypted) {
                    data = JSON.parse(decrypted);
                } else {
                    return;
                }
            }
            
            if (data.type === 'identity') {
                const pub = await crypto.subtle.importKey('jwk', data.publicKey, { name: 'ECDSA', namedCurve: 'P-256' }, true, ['verify']);
                peerIdentities.set(senderId, { 
                    nickname: data.nickname, 
                    fingerprintShort: data.fingerprintShort, 
                    fingerprintFull: data.fingerprintFull || data.fingerprintShort, 
                    publicKey: pub 
                });
                const existing = onlinePeers.get(senderId);
                if (!existing || existing.nickname === "加载中...") {
                    onlinePeers.set(senderId, { 
                        nickname: data.nickname, 
                        fingerprintShort: data.fingerprintShort, 
                        fingerprintFull: data.fingerprintFull || data.fingerprintShort 
                    });
                    updateOnlineUI();
                    if (Date.now() >= silentUntil) appendSystemMessage(`${data.nickname} ${t('joined')}`);
                    await processPendingMessages(senderId);
                }
                if (data.userPublicKey) {
                    await handleUserKeyExchange(senderId, data.userPublicKey);
                }
                const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
                const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                await sendEncrypted(senderId, 'identity', { 
                    nickname: myIdentity.nickname, 
                    fingerprintShort: myIdentity.fingerprintShort, 
                    fingerprintFull: myIdentity.fingerprintFull, 
                    publicKey: myPubJwk, 
                    userPublicKey: myUserPubJwk 
                }, true);
            }
            else if (data.type === 'key_rotate') {
                if (data.newPublicKey) {
                    await handleUserKeyExchange(senderId, data.newPublicKey);
                }
            }
            else if (data.type === 'chat') {
                if (!checkAndUpdateSeq(senderId, data.seq, data.win)) { appendSystemMessage(t('replyAttack')); return; }
                const peerInfo = peerIdentities.get(senderId);
                if (!peerInfo || !peerInfo.publicKey) {
                    if (!pendingMessages.has(senderId)) pendingMessages.set(senderId, []);
                    pendingMessages.get(senderId).push(data);
                    const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                    await sendEncrypted(senderId, 'identity_req', { userPublicKey: myUserPubJwk }, true);
                    return;
                }
                const contentForVerify = { text: data.text, image: data.image, seq: data.seq, win: data.win, fromNick: data.fromNick, fromFp: data.fromFp };
                if (!await verifySignature(peerInfo.publicKey, JSON.stringify(contentForVerify), data.signature)) {
                    appendSystemMessage(t('sigInvalid'));
                    return;
                }
                const displayMsg = data.image ? `<img src="${data.image}">` : escapeHtml(data.text);
                appendChatMessage(data.fromNick, data.fromFp, displayMsg, false);
            }
            else if (data.type === 'identity_req') {
                const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
                const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                await sendEncrypted(senderId, 'identity', { 
                    nickname: myIdentity.nickname, 
                    fingerprintShort: myIdentity.fingerprintShort, 
                    fingerprintFull: myIdentity.fingerprintFull, 
                    publicKey: myPubJwk, 
                    userPublicKey: myUserPubJwk 
                }, true);
            }
            else if (data.type === 'leave') {
                if (onlinePeers.has(senderId)) {
                    const name = onlinePeers.get(senderId).nickname;
                    onlinePeers.delete(senderId);
                    peerIdentities.delete(senderId);
                    peerSeqState.delete(senderId);
                    peerUserKeys.delete(senderId);
                    pendingMessages.delete(senderId);
                    updateOnlineUI();
                    if (name !== "加载中..." && Date.now() >= silentUntil) appendSystemMessage(`${name} ${t('left')}`);
                }
            }
        }
        
        async function processPendingMessages(peerId) {
            const pendings = pendingMessages.get(peerId);
            if (pendings && pendings.length > 0) {
                for (const pending of pendings) {
                    await handleReceivedMessage(peerId, pending);
                }
                pendingMessages.delete(peerId);
            }
        }
        
        async function broadcastMyIdentity() {
            if (!myIdentity || !myUserKeyPair) return;
            const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
            const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
            for (let pid of onlinePeers.keys()) {
                if (pid !== myRawId && onlinePeers.get(pid)?.nickname !== "加载中...") {
                    await sendEncrypted(pid, 'identity', { 
                        nickname: myIdentity.nickname, 
                        fingerprintShort: myIdentity.fingerprintShort, 
                        fingerprintFull: myIdentity.fingerprintFull, 
                        publicKey: myPubJwk, 
                        userPublicKey: myUserPubJwk 
                    }, true);
                }
            }
        }

        async function enterRoom(roomKey) {
            showLoading(t('derivingKey'));
            try {
                // 先派生房间参数（使用 PBKDF2，快速）
                const { appName, channelName, password, roomId } = await deriveRoomParamsFromKey(roomKey);
                console.log(`imgjx: Room derived - ${roomId.slice(0,16)}...`);
                // 再派生 AES 密钥
                aesKey = await deriveAesKeyFromRoomKey(roomKey);
                myUserKeyPair = await generateUserKeyPair();
                const p2p = webconnect({ appName, channelName, connectPassword: password, iceConfiguration: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });
                currentP2P = p2p;
                p2p.getMyId((res) => { myRawId = res.connectId; updateOnlineUI(); setTimeout(() => broadcastMyIdentity(), 500); });
                onlinePeers.clear(); peerIdentities.clear(); peerSeqState.clear(); peerUserKeys.clear(); pendingMessages.clear();
                silentUntil = Date.now() + 2000;
                
                p2p.onConnect(async (ci) => {
                    if (ci.connectId === myRawId) return;
                    if (!onlinePeers.has(ci.connectId)) {
                        onlinePeers.set(ci.connectId, { nickname: "加载中...", fingerprintShort: '??', fingerprintFull: '' });
                        updateOnlineUI();
                        const myPubJwk = await crypto.subtle.exportKey('jwk', myIdentity.publicKey);
                        const myUserPubJwk = await exportPublicKeyJwk(myUserKeyPair.publicKey);
                        await sendEncrypted(ci.connectId, 'identity', { 
                            nickname: myIdentity.nickname, 
                            fingerprintShort: myIdentity.fingerprintShort, 
                            fingerprintFull: myIdentity.fingerprintFull, 
                            publicKey: myPubJwk, 
                            userPublicKey: myUserPubJwk 
                        }, true);
                    }
                });
                
                p2p.onDisconnect(async (ci) => {
                    if (onlinePeers.has(ci.connectId)) {
                        const name = onlinePeers.get(ci.connectId).nickname;
                        onlinePeers.delete(ci.connectId);
                        peerIdentities.delete(ci.connectId);
                        peerSeqState.delete(ci.connectId);
                        peerUserKeys.delete(ci.connectId);
                        pendingMessages.delete(ci.connectId);
                        updateOnlineUI();
                        if (name !== "加载中..." && Date.now() >= silentUntil) appendSystemMessage(`${name} ${t('left')}`);
                    }
                });
                
                p2p.onReceive(async (data, ci) => {
                    if (data?.ciphertext) {
                        try {
                            const combined = new Uint8Array(data.ciphertext);
                            const iv = combined.slice(0, 12);
                            const encrypted = combined.slice(12);
                            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, aesKey, encrypted);
                            const msgData = JSON.parse(decoder.decode(decrypted));
                            await handleReceivedMessage(ci.connectId, msgData);
                        } catch(e) { console.warn("imgjx: Decrypt error:", e); }
                    }
                });
                
                if (keyRotationInterval) clearInterval(keyRotationInterval);
                keyRotationInterval = setInterval(() => rotateUserKey(), 180000);
                
                document.getElementById('homeScreen').style.display = 'none';
                document.getElementById('joinRoomPanel').style.display = 'none';
                document.getElementById('chatRoomUI').style.display = 'flex';
                appendSystemMessage(t('channelReady'));
                document.getElementById('inviteKeyDisplay').innerHTML = '•'.repeat(128);
                document.getElementById('inviteKeyContainer').style.display = 'flex';
                const warn = document.getElementById('historyWarning');
                if(warn) { warn.style.display = 'block'; setTimeout(() => { if(warn) warn.style.display = 'none'; }, 8000); }
                isInRoom = true;
                currentRoomKey = roomKey;
                onlinePeers.set(myRawId, { nickname: myIdentity.nickname, fingerprintShort: myIdentity.fingerprintShort, fingerprintFull: myIdentity.fingerprintFull });
                peerIdentities.set(myRawId, myIdentity);
                updateOnlineUI();
                hideLoading();
            } catch(e) { 
                hideLoading(); 
                console.error(e);
                showAlert("进入房间失败: "+e.message); 
                throw e; 
            }
        }

            }, 10);
        }
        
        async function exportEncryptedFingerprint(identity, password) {
            const encKey = await deriveKeyFromPassword(password, 'FingerprintSalt-V3', FINGERPRINT_ITERATIONS, true);
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, encKey, encoder.encode(identity.seed));
            return JSON.stringify({ nickname: identity.nickname, fingerprintShort: identity.fingerprintShort, iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) });
        }
        
        async function exportCurrentFingerprint() {
            if (!myIdentity) return;
            const content = `<h3>${t('exportPassword')}</h3>
                <input type="password" id="exportPwd1" placeholder="${t('exportPassword')}" style="width:100%; margin:8px 0;">
                <input type="password" id="exportPwd2" placeholder="${t('confirmExportPassword')}" style="width:100%; margin:8px 0;">`;
            showModal(content, async (dialog) => {
                const pwd1 = dialog.querySelector('#exportPwd1').value;
                const pwd2 = dialog.querySelector('#exportPwd2').value;
                if (!pwd1) { showAlert(t('exportPassword')); return; }
                if (pwd1 !== pwd2) { showAlert(t('passwordMismatch')); return; }
                showLoading(t('processing'));
                try {
                    const encrypted = await exportEncryptedFingerprint(myIdentity, pwd1);
                    const blob = new Blob([encrypted], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `${myIdentity.nickname.replace(/[\\/:*?"<>|]/g, '_')}.ip2pfinger`;
                    document.body.appendChild(a); a.click();
                    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
                    showAlert(t('exportSuccess'));
                } catch(e) { showAlert('Export failed: ' + e.message); }
                hideLoading();
            }, null, t('exportFp'), t('close'));
        }
        
        async function handleCreateRoom() {
            if (isInRoom) {
                showConfirm(t('confirmLeave'), async () => {
                    await leaveCurrentRoom();
                    showIdentityDialog(async (identity) => {
                        myIdentity = identity;
                        const roomKey = generate128BitRoomKey();
                        await enterRoom(roomKey);
                    });
                });
            } else {
                showIdentityDialog(async (identity) => {
                    myIdentity = identity;
                    const roomKey = generate128BitRoomKey();
                    await enterRoom(roomKey);
                });
            }
        }
        
        async function handleJoinWithKey() {
            const content = `<h3>${t('joinPanelTitle')}</h3><textarea id="joinKeyInput" placeholder="粘贴128位房间密钥" rows="3" style="width:100%; padding:10px; font-family:monospace;"></textarea><div class="helper-text" style="margin:8px 0;">${t('keyHelper')}</div>`;
            showModal(content, async (dialog) => {
                const roomKey = dialog.querySelector('#joinKeyInput').value.trim();
                if (roomKey.length !== 128) { showAlert(t('invalidKey')); return; }
                if (isInRoom) {
                    showConfirm(t('confirmLeave'), async () => {
                        await leaveCurrentRoom();
                        showIdentityDialog(async (identity) => {
                            myIdentity = identity;
                            await enterRoom(roomKey);
                        });
                    });
                } else {
                    showIdentityDialog(async (identity) => {
                        myIdentity = identity;
                        await enterRoom(roomKey);
                    });
                }
            }, null, t('confirmJoin'), t('back'));
        }
        
        async function leaveCurrentRoom() {
            if (!isInRoom) return;
            showLoading(t('leavingRoom'));
            if (keyRotationInterval) { clearInterval(keyRotationInterval); keyRotationInterval = null; }
            try {
                await broadcastLeave();
                if(currentP2P) currentP2P.Disconnect();
            } catch(e){}
            currentP2P = null; onlinePeers.clear(); peerIdentities.clear(); peerSeqState.clear(); peerUserKeys.clear(); pendingMessages.clear(); aesKey = null; myUserKeyPair = null;
            allMessages = []; currentDisplayStart = 0;
            isInRoom = false;
            document.getElementById('chatRoomUI').style.display = 'none';
            document.getElementById('inviteKeyContainer').style.display = 'none';
            document.getElementById('homeScreen').style.display = 'block';
            hideLoading();
        }
        
        async function sendMessage() {
            let text = document.getElementById('messageInput').value.trim();
            if (!text && !document.getElementById('imageInput').files.length) return;
            if (!currentP2P || !isInRoom || !aesKey) { showAlert("未连接房间"); return; }
            if (document.getElementById('imageInput').files.length) {
                const file = document.getElementById('imageInput').files[0];
                appendSystemMessage(t('compressing'));
                try {
                    const imgData = await compressImage(file);
                    await sendChatMessage('', true, imgData);
                } catch(e) { appendSystemMessage('Image compress failed'); }
                document.getElementById('imageInput').value = '';
                document.getElementById('messageInput').value = '';
                return;
            }
            if (text) { await sendChatMessage(text); document.getElementById('messageInput').value = ''; }
        }
        
        async function showPrivateMessageDialog() {
            if (!currentP2P || !isInRoom || !aesKey) { showAlert("未连接房间"); return; }
            const content = `<h3>${t('privateMsgTitle')}</h3>
                <input type="text" id="targetFingerprint" placeholder="${t('privateMsgPlaceholder')}" style="width:100%; padding:8px; margin:8px 0; font-family:monospace;">
                <textarea id="privateMsgText" rows="3" placeholder="${t('privateMsgContent')}" style="width:100%; padding:8px; margin:8px 0;"></textarea>`;
            showModal(content, async (dialog) => {
                const targetFp = dialog.querySelector('#targetFingerprint').value.trim().toUpperCase();
                const msgText = dialog.querySelector('#privateMsgText').value.trim();
                if (!targetFp) { showAlert("请输入对方完整指纹（64位十六进制）"); return; }
                if (targetFp.length !== 64) { showAlert("指纹必须是64位十六进制字符串"); return; }
                if (!msgText) { showAlert("请输入消息内容"); return; }
                await sendChatMessage(msgText, false, null, targetFp);
            }, null, t('sendPrivate'), t('close'));
        }
        
        // 事件绑定
        document.getElementById('homeCreateBtn').onclick = handleCreateRoom;
        document.getElementById('homeJoinBtn').onclick = handleJoinWithKey;
        document.getElementById('leaveRoomBtn').onclick = () => { if(isInRoom) showConfirm(t('confirmLeave'), () => leaveCurrentRoom()); };
        document.getElementById('sendMsgBtn').onclick = sendMessage;
        document.getElementById('privateMsgBtn').onclick = showPrivateMessageDialog;
        document.getElementById('messageInput').addEventListener('keydown', (e) => { if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMessage(); });
        document.getElementById('copyInviteKeyBtn').onclick = async () => { try { await navigator.clipboard.writeText(currentRoomKey); showAlert(t('copySuccess')); } catch(e) { showAlert("手动复制"); } };
        document.getElementById('imageInput').addEventListener('change', sendMessage);
        
        let keyVisible = false;
        const keyDisplaySpan = document.getElementById('inviteKeyDisplay');
        const toggleKeyBtn = document.getElementById('toggleKeyVisibilityBtn');
        if (keyDisplaySpan && toggleKeyBtn) {
            keyVisible = false;
            keyDisplaySpan.innerHTML = '•'.repeat(128);
            toggleKeyBtn.onclick = () => {
                keyVisible = !keyVisible;
                keyDisplaySpan.innerHTML = keyVisible ? currentRoomKey : '•'.repeat(128);
                toggleKeyBtn.innerText = keyVisible ? '🙈' : '👁️';
            };
        }
        
        document.getElementById('myNicknameLabel').onclick = () => {
            if (!myIdentity) return;
            showPrompt(t('changeNickname'), myIdentity.nickname, (newNick) => {
                if (newNick && newNick.trim() && newNick.trim() !== myIdentity.nickname) {
                    const oldNick = myIdentity.nickname;
                    myIdentity.nickname = newNick.trim();
                    updateOnlineUI();
                    broadcastMyIdentity();
                    appendSystemMessage(`${oldNick} → ${myIdentity.nickname}`);
                }
            }, t('newNickname'));
        };
        document.getElementById('myFingerprintLabel').onclick = () => {
            if(!myIdentity) return;
            showFingerprintDialog(t('myFingerprint'), myIdentity.fingerprintFull, true, () => exportCurrentFingerprint());
        };
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                updateAllTexts();
                if (isInRoom) updateOnlineUI();
                if(document.getElementById('messageInput')) document.getElementById('messageInput').placeholder = t('inputPlaceholder');
                const warn = document.getElementById('historyWarning');
                if(warn && isInRoom) warn.innerHTML = t('historyWarning');
                const loadMoreDiv = document.querySelector('.load-more-trigger');
                if(loadMoreDiv) loadMoreDiv.innerText = t('loadMore');
            };
        });
        updateAllTexts();
    });
</script>
</body>
</html>
